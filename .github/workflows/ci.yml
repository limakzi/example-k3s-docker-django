---
name: Continuous Integration

on:
  push:
    branches:
      - master
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  docker-compose:
    name: Test docker-compose stack
    runs-on: ubuntu-latest

    env:
      DATABASE_NAME: django
      DATABASE_USERNAME: django
      DATABASE_PASSWORD: django

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build services
        run: docker compose build

      - name: Start services
        run: docker compose up --detach --wait

      - name: Run Django system check
        run: docker compose exec django-web python manage.py check

      - name: Tear down services
        if: always()
        run: docker compose down --volumes

  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: app
            dockerfile: .docker/app/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/example-k3s-docker-django-app
          - name: db
            dockerfile: .docker/db/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/example-k3s-docker-django-db

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for ${{ matrix.name }}
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
