---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: django-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: db
          image: example-db:ci
          imagePullPolicy: Never
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: django-db-secret
                  key: DATABASE_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: django-db-secret
                  key: DATABASE_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: django-db-secret
                  key: DATABASE_PASSWORD
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - django
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: django-app
spec:
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
