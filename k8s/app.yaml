---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: django-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: example-app:ci
          imagePullPolicy: Never
          env:
            - name: DATABASE_HOST
              value: db
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: django-db-secret
                  key: DATABASE_NAME
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: django-db-secret
                  key: DATABASE_USERNAME
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: django-db-secret
                  key: DATABASE_PASSWORD
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: django-app
spec:
  selector:
    app: app
  ports:
    - port: 8000
      targetPort: 8000
