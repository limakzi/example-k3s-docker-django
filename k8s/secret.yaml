---
# NOTE: These credentials are for CI/testing only.
# In production, inject secrets from a secure secret management system
# (e.g. Vault, Sealed Secrets, or external-secrets-operator).
apiVersion: v1
kind: Secret
metadata:
  name: django-db-secret
  namespace: django-app
type: Opaque
stringData:
  DATABASE_NAME: django
  DATABASE_USERNAME: django
  DATABASE_PASSWORD: django
